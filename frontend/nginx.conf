server {
    listen 8249;
    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://api:8250/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
