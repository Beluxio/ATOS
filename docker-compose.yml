services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atos
      POSTGRES_PASSWORD: atos
      POSTGRES_DB: atos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atos"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8250:8250"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://atos:atos@db:5432/atos
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8249:8249"
    depends_on:
      - api
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token eyJhIjoiN2Q1ZDVmOWI1NWYxZDRhNGFmNTlkNzMzZGUzMDZiM2YiLCJ0IjoiN2FkMmVhZjAtZTFjNS00NjM0LTkyNjgtYjYwZmE1MDQ2YzkzIiwicyI6Ik5URTVPVFl4T0dZdE9HWmlOUzAwTlRreExUbGxOVEF0Wm1RelpHSTNPV0kyWmpjNCJ9
    restart: unless-stopped
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
